<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Close Checklist{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- DataTables -->
  <link href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body { background: #f4f6f9; font-size: 0.875rem; }

    .navbar-brand { font-weight: 700; letter-spacing: .5px; }

    /* Status badges */
    .badge-status-not-started { background: #6c757d; color: #fff; }
    .badge-status-in-progress { background: #ffc107; color: #212529; }
    .badge-status-complete    { background: #198754; color: #fff; }
    .badge-status-overdue     { background: #dc3545; color: #fff; }

    /* Row highlight by status */
    tr.row-overdue     { background: #fff5f5 !important; }
    tr.row-complete    { background: #f0fff4 !important; }
    tr.row-in-progress { background: #fffdf0 !important; }

    /* Compact select */
    .status-select, .due-date-input { font-size: 0.8rem; padding: 2px 6px; }

    /* Action buttons */
    .btn-xs { padding: 2px 6px; font-size: 0.75rem; line-height: 1.4; }

    /* Description tooltip target */
    .desc-cell { max-width: 340px; }

    /* Bulk bar */
    #bulkBar { border-top: 2px solid #0d6efd; }

    /* Stats badges */
    .stat-badge { font-size: 0.85rem; min-width: 120px; text-align: center; }

    /* Table header */
    #taskTable thead th { white-space: nowrap; font-size: 0.78rem; }

    /* Progress bar strip */
    .progress-strip { height: 6px; border-radius: 0; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark" style="background:#1a2035;">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">
      <i class="fas fa-check-double me-2 text-primary"></i>Close Checklist
    </a>
    <div class="d-flex gap-2">
      <a href="/" class="btn btn-sm btn-outline-light {% if request.path == '/' %}active{% endif %}">
        <i class="fas fa-table-list me-1"></i>Tasks
      </a>
      <a href="/settings" class="btn btn-sm btn-outline-light {% if request.path == '/settings' %}active{% endif %}">
        <i class="fas fa-cog me-1"></i>Settings
      </a>
    </div>
  </div>
</nav>

<main class="container-fluid py-3 px-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} alert-dismissible fade show py-2">
          {{ msg }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</main>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
  <div id="liveToast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastBody"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>

<script>
function showToast(msg, type = 'success') {
  const toast = document.getElementById('liveToast');
  toast.className = `toast align-items-center text-white border-0 bg-${type === 'error' ? 'danger' : type === 'warning' ? 'warning text-dark' : 'success'}`;
  document.getElementById('toastBody').textContent = msg;
  new bootstrap.Toast(toast, { delay: 3500 }).show();
}

function postJSON(url, data) {
  return fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).then(r => r.json());
}
</script>

{% block scripts %}{% endblock %}
</body>
</html>
